<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AI-Augmented Event Ledger Architecture Flow</title>
  <desc id="desc">Client traffic enters the Event Gateway, which owns event persistence, idempotency, audit, and retry outbox. The Gateway calls the internal Account Service over REST with trace propagation. Both services expose logs, health, and metrics.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .label { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 15px Arial, sans-serif; fill: #334155; }
      .tiny { font: 500 13px Arial, sans-serif; fill: #475569; }
      .box { rx: 18; ry: 18; stroke-width: 3; }
      .line { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="56" class="label">AI-Augmented Event Ledger</text>
  <text x="60" y="84" class="small">Deterministic microservices runtime with AI-assisted SDLC evidence, quality gates, and traceable delivery artifacts</text>

  <rect x="55" y="160" width="180" height="100" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="88" y="202" class="label">Client</text>
  <text x="88" y="228" class="small">Browser / upstream</text>

  <rect x="310" y="125" width="260" height="170" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="342" y="168" class="label">Event Gateway</text>
  <text x="342" y="196" class="small">Public REST API :8080</text>
  <text x="342" y="222" class="tiny">Validation, idempotency</text>
  <text x="342" y="244" class="tiny">Audit, rate limiting, tracing</text>
  <text x="342" y="266" class="tiny">Retry, jitter, circuit breaker</text>

  <rect x="310" y="370" width="260" height="125" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="342" y="414" class="label">Gateway H2</text>
  <text x="342" y="442" class="small">events + audit</text>
  <text x="342" y="466" class="small">pending outbox</text>

  <rect x="655" y="125" width="260" height="170" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="687" y="168" class="label">Account Service</text>
  <text x="687" y="196" class="small">Internal REST API :8081</text>
  <text x="687" y="222" class="tiny">Balance projection</text>
  <text x="687" y="244" class="tiny">Transaction history</text>
  <text x="687" y="266" class="tiny">Duplicate transaction guard</text>

  <rect x="655" y="370" width="260" height="125" class="box" fill="#fef3c7" stroke="#d97706"/>
  <text x="687" y="414" class="label">Account H2</text>
  <text x="687" y="442" class="small">transactions</text>
  <text x="687" y="466" class="small">account state</text>

  <rect x="975" y="155" width="170" height="125" class="box" fill="#f1f5f9" stroke="#475569"/>
  <text x="1005" y="198" class="label">Telemetry</text>
  <text x="1005" y="226" class="small">JSON logs</text>
  <text x="1005" y="250" class="small">health + metrics</text>

  <rect x="975" y="370" width="170" height="125" class="box" fill="#fce7f3" stroke="#db2777"/>
  <text x="1005" y="414" class="label">AI SDLC</text>
  <text x="1005" y="442" class="small">agents, prompts</text>
  <text x="1005" y="466" class="small">ADRs, gates, CI</text>

  <path class="line" d="M235 210 L300 210"/>
  <text x="246" y="195" class="tiny">POST /events</text>

  <path class="line" d="M570 210 L645 210"/>
  <text x="579" y="193" class="tiny">REST + X-Trace-Id</text>

  <path class="line" d="M440 295 L440 360"/>
  <text x="456" y="335" class="tiny">local writes</text>

  <path class="line" d="M785 295 L785 360"/>
  <text x="801" y="335" class="tiny">local writes</text>

  <path class="dash" d="M570 430 C630 520 705 520 760 495"/>
  <text x="584" y="534" class="tiny">queued replay when Account Service recovers</text>

  <path class="dash" d="M570 155 C735 70 910 95 1015 150"/>
  <path class="dash" d="M915 210 L965 210"/>
  <text x="760" y="98" class="tiny">structured logs, health, metrics</text>

  <path class="dash" d="M440 495 C570 585 840 585 1020 495"/>
  <text x="575" y="586" class="tiny">repeatable engineering evidence: playbooks, prompts, agent runs, traceability, CI</text>
</svg>
