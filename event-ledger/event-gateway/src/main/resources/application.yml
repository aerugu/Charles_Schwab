server:
  port: 8080
spring:
  application:
    name: event-gateway
  datasource:
    url: jdbc:h2:mem:gatewaydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
account-service:
  base-url: http://localhost:8081
  timeout-ms: 1000
  max-attempts: 2
  backoff-ms: 100
  jitter-ms: 50
  circuit-failure-threshold: 3
  circuit-open-ms: 5000
gateway:
  rate-limit:
    enabled: true
    capacity: 100
    refill-per-second: 50
  pending-retry:
    enabled: true
    interval-ms: 5000
    batch-size: 25
