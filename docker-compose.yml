services:
  account-service:
    build:
      context: .
      dockerfile: Dockerfile.account
    ports:
      - "8081:8081"

  event-gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    depends_on:
      - account-service
    environment:
      ACCOUNT_SERVICE_BASE_URL: http://account-service:8081
    ports:
      - "8080:8080"
